<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 22px;display:flex;flex-wrap:wrap;gap:8px;}
  .t{display:inline-block;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:500;color:#fff;font-family:var(--font-cjk);letter-spacing:.05em;}
  .o{border:1px solid #AAA;background:#fff;color:#333;padding:3px 8px;border-radius:5px;font-size:12px;font-family:var(--font-cjk);letter-spacing:.05em;}
</style></head><body>
<div class="card">
  <span class="t" style="background:#27AE60;">✓ 已做到</span>
  <span class="t" style="background:#E74C3C;">✗ 還做不到</span>
  <span class="t" style="background:#E67E22;">資料授權深度</span>
  <span class="t" style="background:#008B8B;">協議開放程度</span>
  <span class="t" style="background:#2980B9;">使用者行為</span>
  <span class="t" style="background:#2B3A4E;">Navy Badge</span>
  <span class="o">獲得方式</span>
  <span class="o">使用方式</span>
  <span class="o">升等門檻</span>
</div>
</body></html>
