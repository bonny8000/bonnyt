<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;font-family:var(--font-default);background:#fff;color:var(--fg-primary);}
  .card{padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:72px;height:56px;border-radius:6px;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#fff;font-family:var(--font-latin);}
  .swatch.light{color:#333;}
  .lbl{font-size:11px;color:var(--fg-muted);font-family:var(--font-latin);}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch light" style="background:#fff;border:1px solid var(--border-hairline);">FFFFFF</div>
    <div class="swatch light" style="background:#F5F5F5;border:1px solid var(--border-hairline);">F5F5F5</div>
    <div class="swatch" style="background:#2B3A4E;">2B3A4E</div>
    <div class="swatch" style="background:#1E2A3A;">1E2A3A</div>
    <div class="swatch" style="background:#333333;">333333</div>
  </div>
  <div class="lbl">Canvas · Tint · Dark navy · Deep navy · Primary text</div>
</div>
</body></html>
