<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .ex{display:flex;align-items:baseline;gap:16px;}
  .tag{font-size:10px;color:var(--fg-muted-light);font-family:var(--font-latin);min-width:70px;}
  .latin{font-family:var(--font-latin);color:var(--fg-primary);letter-spacing:0;}
</style></head><body>
<div class="card">
  <div class="ex"><span class="tag">40pt Bold</span><span class="latin" style="font-size:40px;font-weight:700;">Report Title</span></div>
  <div class="ex"><span class="tag">28pt Bold</span><span class="latin" style="font-size:28px;font-weight:700;">Section Heading</span></div>
  <div class="ex"><span class="tag">18pt SemiB</span><span class="latin" style="font-size:18px;font-weight:600;">Subsection label</span></div>
  <div class="ex"><span class="tag">14pt</span><span class="latin" style="font-size:14px;">Body text example, 0% letter-spacing.</span></div>
</div>
</body></html>
