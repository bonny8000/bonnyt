<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-latin);}
  .card{padding:20px 22px;display:flex;gap:24px;align-items:flex-end;}
  .row{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:#E8ECF0;}
  .lbl{font-size:10px;color:var(--fg-muted);}
</style></head><body>
<div class="card">
  <div class="row"><div class="box" style="width:30px;height:30px;"></div><span class="lbl">30px gap</span></div>
  <div class="row"><div class="box" style="width:40px;height:40px;"></div><span class="lbl">40px block</span></div>
  <div class="row"><div class="box" style="width:50px;height:50px;"></div><span class="lbl">50px max</span></div>
  <div class="row"><div class="box" style="width:72px;height:72px;"></div><span class="lbl">72 margin top/right</span></div>
  <div class="row"><div class="box" style="width:96px;height:96px;"></div><span class="lbl">96 margin left</span></div>
</div>
</body></html>
