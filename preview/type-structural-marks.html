<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 22px;display:flex;flex-direction:column;gap:12px;font-family:var(--font-cjk);letter-spacing:.05em;color:var(--fg-primary);}
  .row{display:flex;align-items:center;gap:12px;font-size:13px;}
  .bar{width:3px;background:var(--green-bar);border-radius:1px;}
  h3{margin:0;font-size:18px;font-weight:600;}
  .slash{color:#2980B9;font-weight:600;font-size:16px;}
  .breadcrumb{font-size:12px;color:var(--fg-muted);}
</style></head><body>
<div class="card">
  <div class="breadcrumb">Phase 1<span style="font-family:var(--font-latin)">｜</span>章節中文名稱</div>
  <div class="row"><div class="bar" style="height:22px;"></div><h3>子段落標題（綠色豎條）</h3></div>
  <div class="row"><span class="slash">/ 段落一標題</span></div>
  <div class="row"><span style="font-size:14px;">✦ 使用者價值 <span style="color:var(--fg-muted);">· ● 時間軸圓點 · ✓ ⚠ ✗</span></span></div>
</div>
</body></html>
