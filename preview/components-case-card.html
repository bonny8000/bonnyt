<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:22px;display:flex;gap:20px;align-items:stretch;}
  .cs{flex:1;background:#F0F2F5;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:16px;font-family:var(--font-cjk);letter-spacing:.05em;}
  .shot{background:#fff;height:60px;border-radius:6px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  h4{margin:0 0 6px 0;font-size:14px;font-weight:700;color:#333;}
  p{margin:0;font-size:11px;color:#4A4A4A;line-height:1.6;}
  .vb{background:#7B95A8;color:#fff;border-radius:8px;padding:10px 12px;flex:1;font-family:var(--font-cjk);letter-spacing:.05em;}
  .vh{font-size:12px;font-weight:700;margin-bottom:4px;}
  .vt{font-size:11px;line-height:1.5;}
</style></head><body>
<div class="card">
  <div class="cs">
    <div class="shot"></div>
    <h4>案例描述標題</h4>
    <p>兩到三行文字描述此案例的核心觀察與使用者經驗。</p>
  </div>
  <div class="vb">
    <div class="vh">✦ 使用者價值</div>
    <div class="vt">一句話說明案例對使用者的核心價值。</div>
  </div>
</div>
</body></html>
