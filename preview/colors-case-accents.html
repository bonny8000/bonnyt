<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;font-family:var(--font-default);background:#fff;color:var(--fg-primary);}
  .card{padding:18px 22px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:8px;align-items:center;}
  .trio{display:flex;gap:4px;}
  .sw{width:36px;height:36px;border-radius:4px;}
  .name{font-size:12px;color:var(--fg-primary);font-family:var(--font-latin);width:90px;}
</style></head><body>
<div class="card">
  <div class="row"><div class="name">Samsung</div><div class="trio">
    <div class="sw" style="background:#2980B9;"></div><div class="sw" style="background:#7B95A8;"></div><div class="sw" style="background:#F0F2F5;"></div>
  </div></div>
  <div class="row"><div class="name">Sephora</div><div class="trio">
    <div class="sw" style="background:#8B6848;"></div><div class="sw" style="background:#8B7355;"></div><div class="sw" style="background:#F5EDE3;"></div>
  </div></div>
  <div class="row"><div class="name">Carrefour</div><div class="trio">
    <div class="sw" style="background:#8B6914;"></div><div class="sw" style="background:#7B6B4A;"></div><div class="sw" style="background:#F2F0EC;"></div>
  </div></div>
  <div class="row"><div class="name">Dia</div><div class="trio">
    <div class="sw" style="background:#C0392B;"></div><div class="sw" style="background:#A06060;"></div><div class="sw" style="background:#FDF0EC;"></div>
  </div></div>
  <div class="row"><div class="name">PayPal</div><div class="trio">
    <div class="sw" style="background:#B8860B;"></div><div class="sw" style="background:#5F8A8B;"></div><div class="sw" style="background:#F0F0F0;"></div>
  </div></div>
</div>
</body></html>
