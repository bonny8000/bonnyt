<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>

</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#1B8A6B;">1B8A6B</div>
    <div class="swatch" style="background:#27AE60;">27AE60</div>
    <div class="swatch" style="background:#E74C3C;">E74C3C</div>
    <div class="swatch" style="background:#C0392B;">C0392B</div>
    <div class="swatch" style="background:#E67E22;">E67E22</div>
    <div class="swatch" style="background:#008B8B;">008B8B</div>
    <div class="swatch" style="background:#2980B9;">2980B9</div>
  </div>
  <div class="lbl">Green bar · Green status · Red callout · Red agent · Orange tag · Teal tag · Blue user</div>
</div>
</body></html>
