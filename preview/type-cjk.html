<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .ex{display:flex;align-items:baseline;gap:16px;}
  .ex .tag{font-size:10px;color:var(--fg-muted-light);font-family:var(--font-latin);min-width:70px;}
  .cjk{font-family:var(--font-cjk);letter-spacing:.05em;color:var(--fg-primary);}
  .latin{font-family:var(--font-latin);color:var(--fg-primary);}
</style></head><body>
<div class="card">
  <div class="ex"><span class="tag">40pt Bold</span><span class="cjk" style="font-size:40px;font-weight:700;">報告主標題</span></div>
  <div class="ex"><span class="tag">28pt Bold</span><span class="cjk" style="font-size:28px;font-weight:700;">章節中文名稱</span></div>
  <div class="ex"><span class="tag">18pt SemiB</span><span class="cjk" style="font-size:18px;font-weight:600;">子段落標題</span></div>
  <div class="ex"><span class="tag">14pt</span><span class="cjk" style="font-size:14px;">中文內文範例，套用 5% 字距。</span></div>
</div>
</body></html>
