<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-cjk);letter-spacing:.05em;}
  .card{padding:20px 22px;display:flex;flex-direction:column;gap:12px;font-size:13px;color:#333;}
  .row{display:flex;align-items:center;gap:14px;}
  .lbl{font-size:10px;color:var(--fg-muted);font-family:var(--font-latin);min-width:120px;}
  .mark{font-size:16px;}
</style></head><body>
<div class="card">
  <div class="row"><span class="lbl">Done / 已做到</span><span class="mark" style="color:#27AE60;">✓</span></div>
  <div class="row"><span class="lbl">Partial / 有限</span><span class="mark" style="color:#E67E22;">⚠</span></div>
  <div class="row"><span class="lbl">Limitation / 還做不到</span><span class="mark" style="color:#E74C3C;">✗</span></div>
  <div class="row"><span class="lbl">Value header</span><span class="mark">✦ 使用者價值</span></div>
  <div class="row"><span class="lbl">Timeline dot</span><span class="mark" style="color:#AAA;">●</span></div>
  <div class="row"><span class="lbl">Slash marker</span><span class="mark" style="color:#2980B9;">/ 段落標題</span></div>
  <div class="row"><span class="lbl">Breadcrumb sep</span><span class="mark">Phase 1｜章節</span></div>
</div>
</body></html>
