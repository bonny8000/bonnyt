<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .row{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .lbl{font-size:10px;color:var(--fg-muted);font-family:var(--font-latin);}
  .r4{width:60px;height:40px;background:#F0F0F0;border-radius:4px;}
  .r7{width:60px;height:40px;background:#F0F0F0;border-radius:7px;}
  .r12{width:60px;height:40px;background:#F0F0F0;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
</style></head><body>
<div class="card">
  <div class="row"><div class="r4"></div><span class="lbl">4-6px · Tags / badges</span></div>
  <div class="row"><div class="r7"></div><span class="lbl">6-8px · Callouts / nodes</span></div>
  <div class="row"><div class="r12"></div><span class="lbl">8-12px · Case cards (shadow)</span></div>
</div>
</body></html>
