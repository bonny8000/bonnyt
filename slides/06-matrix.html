<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>2×2 Matrix — Layout F</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .content { top: 210px; bottom: 110px; left: 180px; right: 180px; }

    .matrix-wrap {
      position: relative;
      width: 100%; height: 100%;
    }

    /* Axes as SVG-like lines with end arrows */
    .axis-h, .axis-v {
      position: absolute; background: var(--fg-primary);
    }
    .axis-h {
      left: 0; right: 0; top: 50%;
      height: 1.5px; transform: translateY(-50%);
    }
    .axis-v {
      top: 0; bottom: 0; left: 50%;
      width: 1.5px; transform: translateX(-50%);
    }

    /* Axis end labels */
    .axis-end {
      position: absolute;
      font-size: var(--fs-body-sm);
      color: var(--fg-primary);
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      font-weight: var(--fw-medium);
      white-space: nowrap;
    }
    .end-top    { top: -42px;   left: 50%; transform: translateX(-50%); }
    .end-bottom { bottom: -42px; left: 50%; transform: translateX(-50%); }
    .end-left   { top: 50%; left: -24px;  transform: translate(-100%, -50%); }
    .end-right  { top: 50%; right: -24px; transform: translate(100%, -50%); }

    /* Quadrants */
    .quads {
      position: absolute; inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .quad {
      padding: 32px 36px;
      display: flex; flex-direction: column; gap: 10px;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
    }
    .q-tl { align-items: flex-end; text-align: right; justify-content: flex-end; }
    .q-tr { align-items: flex-start; text-align: left; justify-content: flex-end; }
    .q-bl { align-items: flex-end; text-align: right; justify-content: flex-start; }
    .q-br { align-items: flex-start; text-align: left; justify-content: flex-start; }

    .quad-label {
      font-size: 13px;
      color: var(--fg-muted);
      font-weight: var(--fw-medium);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .quad-item {
      font-size: var(--fs-body-sm);
      color: var(--fg-primary);
      line-height: 1.5;
    }
    .quad.faded .quad-item,
    .quad.faded .quad-label { color: var(--fg-disabled); }

    /* Center badge */
    .center-badge {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border: 1.5px solid var(--fg-primary);
      border-radius: 22px;
      padding: 7px 20px;
      font-size: var(--fs-tag);
      font-weight: var(--fw-medium);
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      white-space: nowrap;
      z-index: 3;
    }

    /* Numbered insight circles */
    .insight-num {
      position: absolute;
      width: 34px; height: 34px;
      border: 1.5px solid var(--fg-secondary);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 13px;
      font-weight: var(--fw-semibold);
      background: #fff;
      color: var(--fg-primary);
      z-index: 4;
    }

    /* Overlay dimension tags on axis edges */
    .overlay-tag {
      position: absolute;
      font-size: 11px;
      font-weight: var(--fw-medium);
      padding: 4px 10px;
      border-radius: 12px;
      color: #fff;
      white-space: nowrap;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="slide-breadcrumb" style="font-size: var(--fs-breadcrumb); color: var(--fg-muted);">Phase N<span class="latin">｜</span>章節名稱</div>
      <div class="slide-category">全景視圖</div>
      <div class="title-block">
        <h1 class="slide-title" style="font-size: var(--fs-slide-title);">以 2×2 矩陣定位案例</h1>
      </div>

      <div class="content">
        <div class="matrix-wrap">
          <!-- Axes -->
          <div class="axis-h"></div>
          <div class="axis-v"></div>

          <!-- Axis end labels -->
          <span class="axis-end end-top">Y 軸高值</span>
          <span class="axis-end end-bottom">Y 軸低值</span>
          <span class="axis-end end-left">X 軸低值</span>
          <span class="axis-end end-right">X 軸高值</span>

          <!-- Quadrants -->
          <div class="quads">
            <div class="quad q-tl">
              <div class="quad-label">象限一</div>
              <div class="quad-item">項目 A</div>
              <div class="quad-item">項目 B</div>
            </div>
            <div class="quad q-tr faded">
              <div class="quad-label">象限二</div>
              <div class="quad-item">項目 C</div>
            </div>
            <div class="quad q-bl">
              <div class="quad-label">象限三</div>
              <div class="quad-item">項目 D</div>
              <div class="quad-item">項目 E</div>
            </div>
            <div class="quad q-br faded">
              <div class="quad-label">象限四</div>
              <div class="quad-item">項目 F</div>
            </div>
          </div>

          <!-- Center badge -->
          <div class="center-badge">中心概念<span class="latin"> [</span>標註<span class="latin">]</span></div>

          <!-- Numbered insights -->
          <div class="insight-num" style="top: 14%; left: 46%;">01</div>
          <div class="insight-num" style="top: 64%; left: 18%;">02</div>

          <!-- Overlay dimension tags -->
          <div class="overlay-tag" style="background: var(--orange-tag); top: 50%; right: -14px; transform: translate(100%, -50%);">維度一</div>
          <div class="overlay-tag" style="background: var(--teal-tag); top: -14px; left: 50%; transform: translate(-50%, -100%);">維度二</div>
        </div>
      </div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
