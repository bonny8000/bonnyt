<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>Context / Overview — Layout C</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .content { display: grid; grid-template-columns: 36% 60%; gap: 64px; top: 200px; }
    .col-left {
      border-left: 3px solid var(--green-bar);
      padding-left: 20px;
    }
    .col-left .label {
      font-size: var(--fs-section-header);
      font-weight: var(--fw-semibold);
      color: var(--fg-primary);
      margin-bottom: 18px;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
    }
    .col-left .body {
      font-size: var(--fs-body);
      color: var(--fg-secondary); line-height: 1.8;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
    }
    .col-right .phase {
      padding: 24px 0;
      border-bottom: 1px solid var(--border-hairline);
    }
    .col-right .phase:last-child { border-bottom: none; }
    .col-right .phase-title {
      font-size: var(--fs-section-header-sm);
      font-weight: var(--fw-semibold);
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      margin: 0 0 8px 0;
    }
    .col-right .phase-body {
      font-size: var(--fs-body-sm);
      color: var(--fg-secondary);
      line-height: 1.7;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
    }
    .sources {
      position: absolute;
      right: var(--margin-slide-right);
      bottom: var(--margin-slide-bottom);
      text-align: right;
      max-width: 600px;
    }
    .sources .head {
      font-size: var(--fs-caption);
      color: var(--fg-muted-light);
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      margin-bottom: 4px;
    }
    .sources a {
      display: block;
      font-size: var(--fs-caption);
      color: var(--blue-link);
      text-decoration: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="slide-breadcrumb" style="font-size: var(--fs-breadcrumb); color: var(--fg-muted);">Phase 0<span class="latin">｜</span>研究背景與架構</div>
      <div class="title-block">
        <h1 class="slide-title" style="font-size: var(--fs-slide-title);">Slide Context<span class="latin">｜</span>報告脈絡</h1>
      </div>
      <div class="content">
        <div class="col-left">
          <div class="label">研究任務</div>
          <div class="body">
            用一段簡短的任務描述，說明本報告想回答的核心問題，以及分析的主要範圍與界線。此區塊承載「為什麼」而非「是什麼」。
          </div>
        </div>
        <div class="col-right">
          <div class="phase">
            <h3 class="phase-title">Phase 1<span class="latin">｜</span>章節一名稱</h3>
            <div class="phase-body">本階段處理的核心任務與產出，一行即可。</div>
          </div>
          <div class="phase">
            <h3 class="phase-title">Phase 2<span class="latin">｜</span>章節二名稱</h3>
            <div class="phase-body">本階段處理的核心任務與產出，一行即可。</div>
          </div>
          <div class="phase">
            <h3 class="phase-title">Phase 3<span class="latin">｜</span>章節三名稱</h3>
            <div class="phase-body">本階段處理的核心任務與產出，一行即可。</div>
          </div>
        </div>
      </div>
      <div class="sources">
        <div class="head">資料來源</div>
        <a href="#">https://example.com/source-one</a>
        <a href="#">https://example.com/source-two</a>
      </div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
