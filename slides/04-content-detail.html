<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>Content Detail — Layout D</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .subsec { margin-bottom: 48px; }
    .subsec-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 14px;
    }
    .subsec-header .bar {
      width: 3px; height: 28px;
      background: var(--green-bar); border-radius: 1px;
    }
    .subsec-header h3 {
      font-size: var(--fs-section-header);
      font-weight: var(--fw-semibold);
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
      margin: 0;
    }
    .subsec-header .tag { margin-left: 8px; }
    .bullets {
      padding-left: 20px;
      font-size: var(--fs-body);
      color: var(--fg-secondary);
      line-height: 1.8;
      font-family: var(--font-cjk); letter-spacing: var(--ls-cjk);
    }
    .bullets li { list-style: none; position: relative; margin-bottom: 8px; }
    .bullets li::before {
      content: '-';
      position: absolute; left: -16px; color: var(--fg-secondary);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="slide-breadcrumb" style="font-size: var(--fs-breadcrumb); color: var(--fg-muted);">Phase 1<span class="latin">｜</span>章節中文名稱</div>
      <div class="slide-category">分類標籤</div>
      <div class="title-block">
        <h1 class="slide-title" style="font-size: var(--fs-slide-title);">本頁的核心訊息標題</h1>
      </div>
      <div class="content">
        <div class="subsec">
          <div class="subsec-header">
            <div class="bar"></div>
            <h3>子段落標題一</h3>
            <span class="tag-filled tag-filled--teal tag">分類 A</span>
          </div>
          <ul class="bullets">
            <li>子段落下的第一個要點，保持單句可讀。</li>
            <li>子段落下的第二個要點。</li>
          </ul>
        </div>
        <div class="subsec">
          <div class="subsec-header">
            <div class="bar"></div>
            <h3>子段落標題二</h3>
            <span class="tag-filled tag-filled--orange tag">分類 B</span>
          </div>
          <ul class="bullets">
            <li>子段落下的第一個要點。</li>
            <li>子段落下的第二個要點。</li>
          </ul>
        </div>
        <div class="subsec">
          <div class="subsec-header">
            <div class="bar"></div>
            <h3>子段落標題三</h3>
            <span class="tag-filled tag-filled--blue tag">分類 C</span>
          </div>
          <ul class="bullets">
            <li>子段落下的要點說明。</li>
          </ul>
        </div>
      </div>
      <div class="slide-source"><a href="#">https://example.com/source</a></div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
