<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>Case Study Card — Layout E</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .content { top: 180px; display: grid; grid-template-columns: 42% 55%; gap: 56px; }
    .case-card-left {
      background: var(--case-samsung-tint);
      border-radius: var(--radius-card-lg);
      box-shadow: var(--shadow-card);
      padding: 28px;
      display: flex; flex-direction: column;
    }
    .case-shots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .shot {
      aspect-ratio: 3 / 5; background: #fff;
      border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden; position: relative;
    }
    .shot .fake-ui { position: absolute; inset: 12px; display: flex; flex-direction: column; gap: 8px; }
    .shot .bar { height: 10px; background: #e9ecef; border-radius: 3px; }
    .shot .bar.sm { width: 60%; }
    .shot .img { flex: 1; background: linear-gradient(135deg, #cfd8e0, #b8c4cf); border-radius: 4px; margin: 8px 0; }
    .shot .pill { height: 24px; background: var(--case-samsung-header); border-radius: 12px; width: 60%; margin-top: auto; opacity: 0.85; }
    .case-title-zh { font-size: 22px; font-weight: var(--fw-bold); font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); color: var(--fg-primary); margin: 0 0 10px 0; }
    .case-desc { font-size: var(--fs-body-sm); color: var(--fg-secondary); line-height: 1.7; font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); margin: 0 0 16px 0; }
    .case-source { font-size: var(--fs-caption); color: var(--fg-caption); margin-top: auto; }
    .case-right { position: relative; padding-left: 24px; }
    .dot { position: absolute; left: 0; width: 10px; height: 10px; background: var(--fg-muted-light); border-radius: 50%; transform: translateY(8px); }
    .case-section { margin-bottom: 36px; position: relative; }
    .case-section .slash-header { font-size: var(--fs-case-header); font-weight: var(--fw-semibold); color: var(--case-samsung-header); font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); margin: 0 0 8px 0; }
    .case-section .slash-header::before { content: '/ '; }
    .case-section .body { font-size: var(--fs-body-sm); color: var(--fg-primary); line-height: 1.7; font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); }
    .value-box { background: var(--case-samsung-valuebox); color: #fff; border-radius: 8px; padding: 18px 22px; margin-top: 28px; position: relative; }
    .value-box::before { content: '●'; position: absolute; left: -28px; top: 50%; transform: translateY(-50%); color: var(--fg-muted-light); font-size: 16px; }
    .value-box .vh { font-size: 16px; font-weight: var(--fw-bold); font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); margin-bottom: 6px; }
    .value-box .vb { font-size: var(--fs-body-sm); line-height: 1.6; font-family: var(--font-cjk); letter-spacing: var(--ls-cjk); }
    .sparkle { margin-right: 6px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="slide-breadcrumb" style="font-size: var(--fs-breadcrumb); color: var(--fg-muted);">Phase 1<span class="latin">｜</span>章節中文名稱</div>
      <div class="slide-category">案例分類標籤</div>
      <div class="title-block">
        <h1 class="slide-title" style="font-size: var(--fs-slide-title);">案例名稱<span class="latin"> — </span>一句描述案例的子標</h1>
      </div>

      <div class="content">
        <div class="case-card-left">
          <div class="case-shots">
            <div class="shot"><div class="fake-ui">
              <div class="bar sm"></div><div class="bar"></div><div class="img"></div><div class="pill"></div>
            </div></div>
            <div class="shot"><div class="fake-ui">
              <div class="bar"></div><div class="bar sm"></div><div class="img"></div><div class="bar"></div>
            </div></div>
          </div>
          <h3 class="case-title-zh">案例的核心描述標題</h3>
          <p class="case-desc">以兩到三行文字說明這個案例在做什麼、呈現了什麼樣的使用者經驗。維持觀察性的語氣，不下結論。</p>
          <div class="case-source">example.com/case-source</div>
        </div>

        <div class="case-right">
          <div class="case-section">
            <div class="dot"></div>
            <h4 class="slash-header">段落一標題</h4>
            <p class="body">此段落對應案例的第一個觀察面向，以一到兩句陳述。</p>
          </div>
          <div class="case-section">
            <div class="dot"></div>
            <h4 class="slash-header">段落二標題</h4>
            <p class="body">此段落對應案例的第二個觀察面向。</p>
          </div>
          <div class="case-section">
            <div class="dot"></div>
            <h4 class="slash-header">段落三標題</h4>
            <p class="body">此段落對應案例的第三個觀察面向。</p>
          </div>

          <div class="value-box">
            <div class="vh"><span class="sparkle">✦</span>使用者價值</div>
            <div class="vb">以一句話說明這個案例對使用者的核心價值。</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
