<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>Section Divider — Layout B</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .divider-wrap {
      position: absolute;
      left: var(--margin-slide-left);
      right: var(--margin-slide-right);
      top: 45%;
      transform: translateY(-50%);
    }
    .divider-title {
      font-size: var(--fs-section-title);
      font-weight: var(--fw-bold);
      line-height: 1.2;
      color: var(--fg-primary);
      margin: 0 0 36px 0;
      font-family: var(--font-cjk);
      letter-spacing: var(--ls-cjk);
    }
    .divider-subs {
      font-size: var(--fs-section-subtitle);
      color: var(--fg-muted);
      font-family: var(--font-cjk);
      letter-spacing: var(--ls-cjk);
      line-height: 1.9;
    }
    .divider-subs .item::before {
      content: '- ';
      color: var(--fg-muted);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="divider-wrap">
        <h1 class="divider-title">Phase N<span class="latin">｜</span>章節中文名稱</h1>
        <div class="divider-subs">
          <div class="item">本章節的第一個重點描述</div>
          <div class="item">本章節的第二個重點描述</div>
          <div class="item">本章節的第三個重點描述</div>
        </div>
      </div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
