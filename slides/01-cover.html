<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>Cover — Layout A</title>
  <link rel="stylesheet" href="slide-base.css" />
  <style>
    .cover-wrap {
      position: absolute;
      left: var(--margin-slide-left);
      right: var(--margin-slide-right);
      top: 40%;
      transform: translateY(-50%);
    }
    .cover-title {
      font-size: var(--fs-cover-title);
      font-weight: var(--fw-bold);
      line-height: 1.2;
      color: var(--fg-primary);
      margin: 0 0 28px 0;
      font-family: var(--font-cjk);
      letter-spacing: var(--ls-cjk);
      max-width: 1400px;
    }
    .cover-meta {
      font-size: var(--fs-cover-subtitle);
      color: var(--fg-muted);
      font-family: var(--font-cjk);
      letter-spacing: var(--ls-cjk);
    }
    .cover-meta .latin { color: var(--fg-muted); }
  </style>
</head>
<body>
  <div class="stage">
    <div class="slide">
      <div class="cover-wrap">
        <h1 class="cover-title">報告主標題<span class="latin"> — </span>副標<span class="latin">Subtitle</span></h1>
        <div class="cover-meta">
          作者姓名<span class="latin">｜</span>Mentor<span class="latin">: </span><span class="latin">Name, Name</span>
        </div>
      </div>
    </div>
  </div>
  <script src="slide-fit.js"></script>
</body>
</html>
